<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Item</title>
</head>
<body>
    <h1>Order List</h1>
    <ol>
        <li>Apple</li>
        <ol type="a">
            <li>Green Apple</li>
            <li>Red Apple</li>
            <li>Mustang Apple</li>
        </ol>
        <li>Orange</li>
        <li>Grapes</li>
    </ol>
    <h1>Un-order List</h1>
    <ul>
        <li>Apple</li>
         <ol>
            <li>Green Apple</li>
            <li>Red Apple</li>
            <li>Mustang Apple</li>
        </ol>
        <li>Orange</li>
        <li>Grapes</li>
    </ul>
</body>
</html>
