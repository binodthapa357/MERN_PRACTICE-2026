<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Profile Form</h1>
    <form action="/profile" method="POST">
        <label for="name">Name</label>
        <input 
        id= "name" 
        type="text"
        name="name"
        placeholder="Enter your name">
        <br>

        <label for="age">Age</label>
        <input 
        type="number"
        name="age"
        id="age"
        placeholder="Enter age"
        max="100"
        min="1">
        <br>

        <label for="email">Email Address</label>
        <input 
        type="email"
        id="email"
        name="email">
        <br>

        <label for="phone">Phone Number</label>
        <input id= "phone" type="tel">
        <br>

        <!--Check Box Multi Selector-->
        <label>Hobbies</label>
        <input type="checkbox" name="hobbies" checked>Swimming
        <input type="checkbox" checked>Driving
        <input type="checkbox">Cycling
        <br>
        

        <!--Radio Button Single Selector-->
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Others
        <br>

        <label for="file">Choose a file:</label>
        <input 
        type="file" 
        name="file" 
        id="file">
        <br>

        <label for="ratings">Rating:</label>
        <input 
        type="range"
        id="ratings"
        name="ratings"
        max="10"
        min="0">
        <br>

        <label for="color">Pick Color:</label>
        <input type="color" id="color" name="color">
        <br>

        <label for="password">Password:</label>
        <input type="password" name="password" id="password">
        <br>

        <label for="search">Search</label>
        <input type="search" name="search" id="search" list="search-items">
        <datalist id="search-items">
            <option value="mobile">Mobile</option>
            <option value="laptop"></option>
            <option value="bike"></option>
            <option value="cars"></option>
        </datalist> <br>

        <label for="class">Class</label>
        <select name="class" id="class">
            <option value="choose a class" disabled selected>Choose your class</option>
            <option value="class1">Class 1</option>
            <option value="class2">Class 2</option>
            <option value="class3">Class 3</option>
            <option value="class4">Class 4</option>
        </select> <br>

        <label for="message">Message:</label>
        <textarea name="message" id="message" rows="10" cols="25"></textarea>
        <br>

        <button type="submit" title="submit">Save Profile</button>
    </form>
</body>
</html>
